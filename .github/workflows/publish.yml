name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (core + dev only)
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run core tests (excludes PDF export tests)
        run: |
          pytest tests/ --ignore=tests/test_pdf_export.py --ignore=tests/test_pdf_generation.py -v

      - name: Clean dist directory
        run: rm -rf dist/

      - name: Build distribution
        run: python -m build

      - name: Verify package metadata
        run: |
          python << 'PYEOF'
          import glob, zipfile
          whl = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(whl) as z:
              meta = [f for f in z.namelist() if f.endswith('METADATA')][0]
              data = z.read(meta).decode()
          assert 'weasyprint' not in data, 'weasyprint leaked into core deps!'
          print('Core package has no PDF hard deps')
          print('Distributions:')
          import os
          for f in os.listdir('dist'):
              print(f'  {f} ({os.path.getsize(f):,} bytes)')
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/jasper-finance
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
