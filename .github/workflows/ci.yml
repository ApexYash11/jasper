name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies (Cairo, GObject, etc.)
      continue-on-error: true
      run: |
        sudo apt-get update || sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libcairo2-dev \
          pkg-config \
          libgobject-introspection1 \
          gir1.2-gtk-3.0 \
          libgirepository1.0-dev \
          python3-dev \
          build-essential 2>&1 || echo "⚠️  Some system dependencies could not be installed, but continuing with tests"
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest pytest-cov ruff pytest-asyncio pytest-mock
    
    - name: Lint with ruff
      run: ruff check .
    
    - name: Run tests
      run: |
        pytest tests/
