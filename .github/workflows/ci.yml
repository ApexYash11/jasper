name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ###########################################################################
  # CORE TESTS — no system deps needed, runs across all Python versions
  ###########################################################################
  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies (core only)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      shell: bash
      run: |
        echo "=== Debug: Environment ==="
        echo "PATH=$PATH"
        echo "Python: $(which python || echo 'NOT FOUND')"
        echo "Python3: $(which python3 || echo 'NOT FOUND')"
        echo "Python version: $(python --version 2>&1 || python3 --version 2>&1)"
        echo "=== Debug: Try installing ruff ==="
        pip install ruff 2>&1 || python -m pip install ruff 2>&1
        echo "=== Debug: Locate ruff ==="
        which ruff 2>&1 || echo "ruff binary not on PATH"
        ruff --version 2>&1 || echo "ruff binary failed"
        echo "=== Debug: Try python -m ruff ==="
        python -m ruff --version 2>&1 || python3 -m ruff --version 2>&1
        echo "=== Run ruff check ==="
        ruff check . || python -m ruff check . || python3 -m ruff check .

    - name: Run core tests (excludes PDF export tests)
      run: |
        pytest tests/ --ignore=tests/test_pdf_export.py --ignore=tests/test_pdf_generation.py -v

  ###########################################################################
  # PDF EXPORT TESTS — needs system libraries (Cairo/GTK), single Python
  ###########################################################################
  test-export:
    needs: test-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (Cairo, Pango, GTK)
      continue-on-error: true
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libcairo2-dev pkg-config libgobject-introspection1 \
          gir1.2-gtk-3.0 libgirepository1.0-dev python3-dev \
          build-essential 2>&1 || echo "System deps unavailable — PDF tests may be skipped"

    - name: Install Python dependencies (with export extras)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,export]"
        pip install ruff

    - name: Run PDF export tests
      run: |
        pytest tests/test_pdf_export.py tests/test_pdf_generation.py -v
